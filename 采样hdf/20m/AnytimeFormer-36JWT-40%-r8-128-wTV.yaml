model: 
  model_name: "AnytimeFormer" # model type, Transformer/AnytimeFormer

  with_atten_mask: False # whether using attention mask
  n_groups: 2 # num of layer groups
  n_group_inner_layers: 1 # num of group-inner layers
  d_model: 128 # model hidden dim
  d_inner: 64 # hidden size of feed forward layer
  n_head: 4 # head num of self-attention
  d_k: 32 # key dim
  d_v: 32 # value dim
  dropout: 0.1 # drop out rate
  diagonal_attention_mask: True # whether to apply diagonal attention mask
  
  #----- 根据 36JWT 数据修改的参数 -------
  d_feature: 6 # S2 波段数 (6个波段)
  d_time: 61 # S2 时间步数
  with_X_aux: True # 使用 SAR 数据
  d_time_aux: 70 # S1 时间步数
  d_feature_aux: 3 # S1 波段数 (VV, VH, ratio)
  #--------------------------------------
  
  # Anytime 模式输出控制
  # 输出所有61个S2影像的DOY（完整时间序列）
  # 2024年9月-2025年8月 (DOY 245-242): 从2024-09-01到2025-08-30
  # 完整的61个DOY（与HDF文件中的date数组完全一致）
  anytime_ouput: [245, 248, 250, 258, 270, 280, 285, 288, 293, 308, 320, 323, 330, 335, 340, 345, 4, 34, 69, 89, 99, 104, 109, 112, 116, 127, 129, 134, 139, 144, 147, 149, 154, 157, 159, 162, 167, 169, 176, 177, 179, 182, 184, 187, 189, 192, 194, 196, 197, 199, 202, 212, 214, 216, 217, 224, 227, 232, 234, 236, 242]

  learn_emb: False
  rank: 8

training:
  batch_size: 512  # 从128增加到512，充分利用显存
  lr: 0.0001
  epochs: 10
  num_workers: 4
  artificial_missing_rate: 0.25
  device: "cuda"
  with_rec_loss: True
  with_tv: True

mode:
  debug_mode: False
  mode: "train"
  gap_mode: "random"

dataset:
  original_dataset_path: "/public/home/xwlin/Data/songyibo/dataset_for_model/36JWT/hdf/anytime.hdf"
  work_dir: "/public/home/xwlin/Data/songyibo/dataset_for_model/36JWT/work_dir/anytime_20m_train"
  saved_model_path: None

experiment:
  exp_name: ""
  ratio: "40%"
